<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — MenuCraft Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:#0f0f13;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#1a1a22;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 40px;width:100%;max-width:440px}
  .logo{text-align:center;margin-bottom:36px}
  .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
  .logo h1{font-size:1.4rem;font-weight:800;color:#fff}
  .logo p{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:4px}
  h2{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:24px;text-align:center}
  .field{margin-bottom:18px}
  label{display:block;font-size:.85rem;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:8px}
  input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:.95rem;outline:none;transition:border .2s}
  input:focus{border-color:#f59e0b}
  input::placeholder{color:rgba(255,255,255,.25)}
  .btn{width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;padding:15px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .error{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:10px;padding:12px 16px;color:#f43f5e;font-size:.875rem;margin-bottom:16px;display:none}
  .footer{text-align:center;margin-top:24px;color:rgba(255,255,255,.4);font-size:.875rem}
  .footer a{color:#f59e0b;text-decoration:none;font-weight:600}
  .divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:24px 0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <h1>MenuCraft Pro</h1>
    <p>إدارة قائمة طعامك بذكاء</p>
  </div>

  <h2>تسجيل الدخول</h2>

  <div class="error" id="errorMsg"></div>

  <div class="field">
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="login()">دخول</button>

  <hr class="divider">

  <div class="footer">
    ما عندك حساب؟ <a href="register.html">إنشاء حساب مجاني</a>
  </div>
</div>

<script type="module">
  import { Auth } from './js/db.js';

  // Redirect if already logged in
  const user = await Auth.getUser();
  if (user) window.location.href = 'dashboard.html';

  window.login = async function() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('errorMsg');

    errEl.style.display = 'none';
    if (!email || !password) { showError('يرجى تعبئة جميع الحقول'); return; }

    btn.disabled    = true;
    btn.textContent = 'جاري الدخول...';

    try {
      await Auth.signIn(email, password);
      window.location.href = 'dashboard.html';
    } catch(e) {
      showError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
      btn.disabled    = false;
      btn.textContent = 'دخول';
    }
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent     = msg;
    el.style.display   = 'block';
  }

  // Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') window.login(); });
</script>
</body>
</html>
