<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — MenuCraft Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:#0f0f13;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#1a1a22;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 40px;width:100%;max-width:440px}
  .logo{text-align:center;margin-bottom:36px}
  .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
  .logo h1{font-size:1.4rem;font-weight:800;color:#fff}
  .logo p{color:rgba(255,255,255,.4);font-size:.85rem;margin-top:4px}
  h2{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:24px;text-align:center}
  .field{margin-bottom:18px}
  label{display:block;font-size:.85rem;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:8px}
  input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;color:#fff;font-family:'Tajawal',sans-serif;font-size:.95rem;outline:none;transition:border .2s}
  input:focus{border-color:#f59e0b}
  input::placeholder{color:rgba(255,255,255,.25)}
  .btn{width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;padding:15px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .error{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:10px;padding:12px 16px;color:#f43f5e;font-size:.875rem;margin-bottom:16px;display:none}
  .success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:12px 16px;color:#10b981;font-size:.875rem;margin-bottom:16px;display:none}
  .footer{text-align:center;margin-top:24px;color:rgba(255,255,255,.4);font-size:.875rem}
  .footer a{color:#f59e0b;text-decoration:none;font-weight:600}
  .divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:24px 0}
  .hint{font-size:.78rem;color:rgba(255,255,255,.3);margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <h1>MenuCraft Pro</h1>
    <p>إدارة قائمة طعامك بذكاء</p>
  </div>

  <h2>إنشاء حساب مجاني</h2>

  <div class="error"   id="errorMsg"></div>
  <div class="success" id="successMsg"></div>

  <div class="field">
    <label>اسم المطعم</label>
    <input type="text" id="restaurantName" placeholder="مثال: مطعم الذهبي">
    <div class="hint">سيُستخدم كرابط للمنيو: menucraft.pro/al-thahabi</div>
  </div>

  <div class="field">
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="8 أحرف على الأقل" autocomplete="new-password">
  </div>

  <div class="field">
    <label>تأكيد كلمة المرور</label>
    <input type="password" id="password2" placeholder="أعد كتابة كلمة المرور" autocomplete="new-password">
  </div>

  <button class="btn" id="registerBtn" onclick="register()">إنشاء الحساب</button>

  <hr class="divider">

  <div class="footer">
    عندك حساب؟ <a href="login.html">تسجيل الدخول</a>
  </div>
</div>

<script type="module">
  import { Auth } from './js/db.js';

  const user = await Auth.getUser();
  if (user) window.location.href = 'dashboard.html';

  window.register = async function() {
    const name  = document.getElementById('restaurantName').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const pass2 = document.getElementById('password2').value;
    const btn   = document.getElementById('registerBtn');

    document.getElementById('errorMsg').style.display   = 'none';
    document.getElementById('successMsg').style.display = 'none';

    if (!name || !email || !pass || !pass2) { showError('يرجى تعبئة جميع الحقول'); return; }
    if (pass.length < 8)  { showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل'); return; }
    if (pass !== pass2)   { showError('كلمتا المرور غير متطابقتين'); return; }

    btn.disabled    = true;
    btn.textContent = 'جاري الإنشاء...';

    try {
      await Auth.signUp(email, pass, name);
      document.getElementById('successMsg').textContent = '✅ تم إنشاء الحساب! تحقق من بريدك الإلكتروني لتفعيل الحساب.';
      document.getElementById('successMsg').style.display = 'block';
      btn.textContent = 'تم الإرسال';
      setTimeout(() => window.location.href = 'login.html', 3000);
    } catch(e) {
      showError(e.message || 'حدث خطأ، يرجى المحاولة مجدداً');
      btn.disabled    = false;
      btn.textContent = 'إنشاء الحساب';
    }
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent   = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
