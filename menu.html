<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MenuCraft Pro — عرض المنيو</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&amp;family=Cairo:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#c9a84c;
  --bg0:#fbf9f5; /* Lux Aurum Surface */
  --bg1:#f5f3ef; /* Surface Container Low */
  --bg2:#ffffff; /* Surface Container Lowest */
  --bg3:#efede9; /* Surface Container */
  --bg4:#dbdad6; /* Surface Dim */
  --tx0:#1a1a1a;
  --tx1:#4a4a4a;
  --tx2:#7a7a7a;
  --tx3:#a0a0a0;
  --r:8px; /* ROUND_EIGHT */
  --shadow: 0 4px 12px rgba(0,0,0,0.05);
}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg0);color:var(--tx0);min-height:100vh;direction:rtl;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* ── BANNER ── */
.banner{position:relative;height:260px;overflow:hidden;flex-shrink:0;background: #1a1a1a;}
@media(min-width:600px){.banner{height:320px}}
@media(min-width:900px){.banner{height:400px}}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.ov1{position:absolute;inset:0;background:rgba(0,0,0,.3)}
.ov2{position:absolute;inset:0;background:linear-gradient(to top, rgba(251,249,245,1) 0%, rgba(251,249,245,0) 100%)}
.banner-top{position:absolute;top:0;left:0;right:0;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;z-index:3}
@media(min-width:600px){.banner-top{padding:16px 28px}}
@media(min-width:900px){.banner-top{padding:20px 48px}}
.b-cart{position:relative;width:42px;height:42px;border-radius:var(--r);background:rgba(255,255,255,.9);border:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx0);box-shadow: var(--shadow)}
.b-cart-badge{position:absolute;top:-5px;left:-5px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;display:none}
.b-open{background:rgba(255,255,255,.9);border:1px solid var(--bg3);border-radius:24px;padding:6px 14px;display:flex;align-items:center;gap:7px;box-shadow: var(--shadow)}
.b-dot{width:7px;height:7px;border-radius:50%;background:#4ade80}
.b-open span{font-size:11px;font-weight:700;color:var(--tx0)}
.b-menu{width:42px;height:42px;border-radius:var(--r);background:rgba(255,255,255,.9);border:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx0);box-shadow: var(--shadow)}

.banner-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 16px 24px;display:flex;align-items:flex-end;justify-content:space-between;z-index:3}
@media(min-width:600px){.banner-bottom{padding:18px 28px 32px}}
@media(min-width:900px){.banner-bottom{padding:22px 48px 40px}}
.b-logo{width:64px;height:64px;border-radius:var(--r);border:1px solid var(--accent);background:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bodoni Moda',serif;font-size:24px;color:var(--accent);box-shadow: var(--shadow);margin-bottom:12px}
@media(min-width:600px){.b-logo{width:72px;height:72px;font-size:28px}}
.b-fine{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
.b-name{font-family:'Bodoni Moda',serif;font-size:32px;color:var(--tx0);line-height:1;margin-bottom:8px;font-weight:700}
@media(min-width:600px){.b-name{font-size:44px}}
@media(min-width:900px){.b-name{font-size:56px}}
.b-stars-row{display:flex;align-items:center;gap:8px}
.b-stars{display:flex;gap:2px}
.b-rating{font-size:12px;color:var(--tx2);font-weight:600}
.b-order{background:var(--accent);color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;padding:10px 24px;border-radius:var(--r);border:none;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow: 0 4px 10px rgba(201,168,76,0.3)}
.b-order:hover{transform: translateY(-2px); filter: brightness(1.05)}

/* ── STATS ── */
.stats{background:var(--bg2);border-bottom:1px solid var(--bg3);display:grid;grid-template-columns:1fr 1fr 1fr;box-shadow: 0 2px 8px rgba(0,0,0,0.02)}
.stat{display:flex;flex-direction:column;align-items:center;padding:16px 0;border-right:1px solid var(--bg3)}
.stat:first-child{border:none}
.stat-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.stat-top i{font-size:14px;color:var(--accent)}
.stat-num{font-family:'Bodoni Moda',serif;font-size:19px;color:var(--tx0);font-weight:700}
.stat-lbl{font-size:10px;font-weight:700;color:var(--tx2);letter-spacing:1px;text-transform:uppercase}

/* ── MAIN ── */
.main{max-width:1024px;margin:0 auto;width:100%;padding:0 16px}
@media(min-width:600px){.main{padding:0 32px}}

/* ── SECTION HDR ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:24px 0 16px}
.sec-title{font-family:'Bodoni Moda',serif;font-size:22px;color:var(--tx0);font-weight:700}
@media(min-width:600px){.sec-title{font-size:26px}}
.sec-link{font-size:13px;color:var(--accent);font-weight:700;cursor:pointer}
.sec-count{font-size:13px;font-weight:600;color:var(--tx2)}
.add-rev{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--accent);background:#fff;border:1px solid var(--accent);border-radius:var(--r);padding:6px 14px;cursor:pointer;transition: all .2s}
.add-rev:hover{background: var(--bg0)}

/* ── POPULAR ── */
.pop-scroll{display:flex;gap:16px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.pop-scroll::-webkit-scrollbar{display:none}
.pop-card{flex-shrink:0;width:160px;background:var(--bg2);border-radius:var(--r);overflow:hidden;border:1px solid var(--bg3);cursor:pointer;transition:all .3s ease;box-shadow: var(--shadow)}
.pop-card:hover{transform:translateY(-4px);box-shadow: 0 8px 20px rgba(0,0,0,0.08)}
@media(min-width:600px){.pop-card{width:190px}}
.pop-img{height:110px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;background: var(--bg1)}
.pop-badge{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.pop-body{padding:12px 14px}
.pop-name{font-size:14px;font-weight:700;color:var(--tx0);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pop-prices{display:flex;align-items:baseline;gap:6px}
.pop-price{font-family:'Bodoni Moda',serif;font-size:17px;color:var(--accent);font-weight:700}
.pop-old{font-size:11px;color:var(--tx3);text-decoration:line-through}

/* ── CATS GRID ── */
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-bottom:16px}
@media(min-width:600px){.cats-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.cats-grid{grid-template-columns:repeat(4,1fr)}}
.cat-card{border-radius:var(--r);overflow:hidden;cursor:pointer;background:var(--bg2);border:1px solid var(--bg3);transition:all .3s ease;box-shadow: var(--shadow)}
.cat-card:hover{transform:translateY(-4px);box-shadow: 0 8px 20px rgba(0,0,0,0.08)}
.cat-top{height:100px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background: var(--bg1)}
.cat-tex{position:absolute;inset:0;background-image:radial-gradient(var(--accent) 0.5px, transparent 0.5px);background-size: 10px 10px;opacity: 0.1;}
.cat-ico{width:56px;height:56px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;z-index:1;background:#fff;border:1px solid var(--bg3);box-shadow: 0 2px 6px rgba(0,0,0,0.03)}
.cat-bot{padding:12px 14px;border-top:1px solid var(--bg3);text-align: center}
.cat-name{font-family:'Bodoni Moda',serif;font-size:15px;color:var(--tx0);font-weight:700}
.cat-count{font-size:11px;color:var(--tx2);font-weight:600;margin-top:2px}

/* ── REVIEWS ── */
.rev-scroll{display:flex;gap:16px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch}
.rev-scroll::-webkit-scrollbar{display:none}
.rev-card{flex-shrink:0;width:260px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bg3);padding:18px;box-shadow: var(--shadow)}
@media(min-width:600px){.rev-card{width:300px}}
.rev-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.rev-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.rev-nm{font-size:14px;font-weight:700;color:var(--tx0);margin-bottom:2px}
.rev-dt{font-size:11px;color:var(--tx2)}
.rev-stars{display:flex;gap:2px;margin-bottom:10px}
.rev-txt{font-size:13px;color:var(--tx1);line-height:1.6;font-style: italic}

/* ── REVIEW FORM ── */
.rev-form{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:24px;margin-bottom:32px;box-shadow: var(--shadow)}
.rft{font-family:'Bodoni Moda',serif;font-size:18px;font-weight:700;color:var(--tx0);margin-bottom:16px}
.rf-inp{width:100%;background:var(--bg0);border:1px solid var(--bg3);border-radius:var(--r);padding:11px 16px;color:var(--tx0);font-family:'Cairo',sans-serif;font-size:14px;outline:none;margin-bottom:12px;transition:border-color .2s}
.rf-inp:focus{border-color:var(--accent)}
.rf-stars{display:flex;gap:8px;margin-bottom:12px}
.rf-star{font-size:28px;cursor:pointer;color:var(--bg4);transition:color .1s}
.rf-star.on{color:var(--accent)}
.rf-ta{width:100%;background:var(--bg0);border:1px solid var(--bg3);border-radius:var(--r);padding:11px 16px;color:var(--tx0);font-family:'Cairo',sans-serif;font-size:14px;outline:none;resize:none;min-height:90px;line-height:1.6;margin-bottom:16px}
.rf-ta:focus{border-color:var(--accent)}
.rf-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:12px 28px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.rf-btn:hover{filter:brightness(1.05); transform: translateY(-1px)}

/* ── BACK BAR ── */
.back-bar{display:flex;align-items:center;gap:12px;padding:20px 0 12px}
.back-btn{width:36px;height:36px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx1);font-size:16px;box-shadow: var(--shadow)}
.back-btn:hover{background:var(--bg1)}
.back-title{font-family:'Bodoni Moda',serif;font-size:22px;color:var(--tx0);font-weight:700}
.back-sub{font-size:12px;color:var(--tx2);font-weight:600}

/* ── ITEMS LIST ── */
.items-list{display:flex;flex-direction:column;gap:14px;padding-bottom:32px}
.item-row{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);display:flex;overflow:hidden;transition:all .2s ease;box-shadow: var(--shadow)}
.item-row:hover{border-color:var(--accent);box-shadow: 0 6px 15px rgba(0,0,0,0.05)}
.item-thumb{width:90px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;background: var(--bg1)}
@media(min-width:600px){.item-thumb{width:120px}}
.item-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.item-tag{display:inline-block;font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;margin-bottom:6px;text-transform:uppercase}
.item-name{font-size:15px;font-weight:700;color:var(--tx0);margin-bottom:4px}
.item-desc{font-size:12px;color:var(--tx2);line-height:1.5;margin-bottom:10px}
.item-foot{display:flex;align-items:center;justify-content:space-between}
.item-prices{display:flex;align-items:baseline;gap:6px}
.item-price{font-family:'Bodoni Moda',serif;font-size:20px;font-weight:700}
.item-add{width:32px;height:32px;border-radius:var(--r);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-add:active{transform:scale(.9)}

/* ── CART DRAWER ── */
.cart-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:98;backdrop-filter: blur(4px)}
.cart-ov.open{display:block}
.cart-drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:520px;z-index:99;background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--bg3);display:flex;flex-direction:column;max-height:80vh;transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1);box-shadow: 0 -10px 40px rgba(0,0,0,0.1)}
.cart-drawer.open{transform:translateX(-50%) translateY(0)}
.cd-handle{width:40px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 0}
.cd-hdr{padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.cd-title{font-family:'Bodoni Moda',serif;font-size:20px;font-weight:700;color:var(--tx0)}
.cd-body{flex:1;overflow-y:auto;padding:0 20px}
.cd-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--bg3)}
.cd-nm{flex:1;font-size:14px;font-weight:700;color:var(--tx0)}
.cd-qbtn{width:26px;height:26px;border-radius:50%;border:none;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cd-price{font-family:'Bodoni Moda',serif;font-size:16px;font-weight:700}
.cd-footer{padding:18px 20px 28px;border-top:1px solid var(--bg3)}
.cd-total{font-family:'Bodoni Moda',serif;font-size:28px;font-weight:700}
.cd-order{width:100%;height:50px;border:none;border-radius:var(--r);font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;color:#fff;transition:all .2s;box-shadow: 0 4px 12px rgba(201,168,76,0.3)}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--tx0);border-radius:30px;padding:10px 24px;font-size:13px;font-weight:700;color:#fff;opacity:0;transform:translateY(20px);transition:all .3s;box-shadow: 0 8px 24px rgba(0,0,0,0.15)}
.toast.show{opacity:1;transform:translateY(0)}

/* ── EMPTY ── */
.empty i{font-size:48px;color:var(--bg4);margin-bottom:16px}
.empty p{font-size:14px;font-weight:600;color:var(--tx2)}

.error-page h2{font-family:'Bodoni Moda',serif;font-size:22px}
</style>
</head>
<body>
<div id="app">
<!-- BANNER -->
<div class="banner">
<canvas id="bg-canvas"></canvas>
<div class="ov1"></div><div class="ov2"></div>
<div class="banner-top">
<div aria-label="السلة" class="b-cart" onclick="toggleCart()">
<i aria-hidden="true" class="ti ti-shopping-cart"></i>
<div class="b-cart-badge" id="cart-badge">0</div>
</div>
<div class="b-open"><div class="b-dot"></div><span>مفتوح الآن</span></div>
<div class="b-menu"><i aria-hidden="true" class="ti ti-menu-2"></i></div>
</div>
<div class="banner-bottom">
<div>
<div class="b-logo" id="b-logo">CT</div>
<div class="b-fine" id="b-fine">FINE DINING</div>
<div class="b-name" id="b-name">CHEF'S TABLE</div>
<div class="b-stars-row">
<div class="b-stars" id="b-stars">★★★★★</div>
<span class="b-rating" id="b-rating">0.0 (0)</span>
</div>
</div>
<button class="b-order" onclick="scrollToMenu()">اطلب الآن</button>
</div>
</div>
<!-- STATS -->
<div class="stats">
<div class="stat">
<div class="stat-top"><i aria-hidden="true" class="ti ti-star"></i><span class="stat-num" id="s-rating">0.0</span></div>
<div class="stat-lbl">تقييم</div>
</div>
<div class="stat">
<div class="stat-top"><i aria-hidden="true" class="ti ti-tools-kitchen-2"></i><span class="stat-num" id="s-dishes">0</span></div>
<div class="stat-lbl">طبق</div>
</div>
<div class="stat">
<div class="stat-top"><i aria-hidden="true" class="ti ti-clock"></i><span class="stat-num">30 د</span></div>
<div class="stat-lbl">توصيل</div>
</div>
</div>
<!-- MAIN -->
<div class="main" id="main">
<!-- HOME -->
<div id="view-home">
<div class="sec-hdr" id="menu-anchor">
<div class="sec-title">الأكثر طلباً 🔥</div>
<span class="sec-link" onclick="openAll()">عرض الكل ←</span>
</div>
<div class="pop-scroll" id="pop-row"></div>
<div class="sec-hdr">
<div class="sec-title">الأصناف</div>
<span class="sec-count" id="cats-count">0 صنف</span>
</div>
<div class="cats-grid" id="cats-grid"></div>
<div class="sec-hdr">
<div class="sec-title">التقييمات</div>
<span class="add-rev" onclick="document.getElementById('rev-form').scrollIntoView({behavior:'smooth'})">
<i aria-hidden="true" class="ti ti-plus"></i> أضف تقييم
        </span>
</div>
<div class="rev-scroll" id="rev-row"></div>
<div class="rev-form" id="rev-form">
<div class="rft">شاركنا تجربتك 📝</div>
<input class="rf-inp" id="rf-name" maxlength="40" placeholder="اسمك"/>
<div class="rf-stars" id="rf-stars">
<span class="rf-star on" onclick="setStars(1)">★</span>
<span class="rf-star on" onclick="setStars(2)">★</span>
<span class="rf-star on" onclick="setStars(3)">★</span>
<span class="rf-star on" onclick="setStars(4)">★</span>
<span class="rf-star on" onclick="setStars(5)">★</span>
</div>
<textarea class="rf-ta" id="rf-text" placeholder="شاركنا تجربتك مع المطعم..."></textarea>
<button class="rf-btn" onclick="submitReview()">إرسال التقييم</button>
</div>
</div>
<!-- ITEMS VIEW -->
<div id="view-items" style="display:none">
<div class="back-bar">
<button aria-label="رجوع" class="back-btn" onclick="showHome()"><i aria-hidden="true" class="ti ti-arrow-right"></i></button>
<div>
<div class="back-title" id="iv-title">الأطباق</div>
<div class="back-sub" id="iv-sub">0 أطباق</div>
</div>
</div>
<div class="items-list" id="items-list"></div>
</div>
</div>
</div>
<!-- CART OVERLAY + DRAWER -->
<div class="cart-ov" id="cart-ov" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
<div class="cd-handle"></div>
<div class="cd-hdr">
<div class="cd-title">سلة الطلب</div>
<button class="cd-close" onclick="closeCart()" style="background:none;border:none;color:var(--tx2);font-size:20px;cursor:pointer"><i aria-hidden="true" class="ti ti-x"></i></button>
</div>
<div class="cd-body" id="cart-body"></div>
<div class="cd-footer" id="cart-footer" style="display:none">
<div class="cd-total-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<span style="font-size:14px;color:var(--tx2);font-weight:700">المجموع النهائي</span>
<span class="cd-total" id="cart-total"></span>
</div>
<button class="cd-order" id="cd-order" onclick="placeOrder()">تأكيد الطلب الآن</button>
</div>
</div>
<!-- TOAST -->
<div class="toast-wrap"><div class="toast" id="toast"></div></div>
<script src="js/storage.js"></script>
<script>
// ────────────────────────────────────────────────
const CATS_BG=['#f5f3ef','#efede9','#fdfcfb','#f9f8f5'];
const AV_COLORS=['#c9a84c','#1a1a1a','#4a4a4a','#7a7a7a','#a0a0a0','#b08e35','#d4bc7d','#94742a'];
let MENU=null, ACCENT='#c9a84c', CART=[], revStars=5, curCat=null;

function revKey(s){return'mc_rev_'+s}
function loadRevs(s){try{return JSON.parse(localStorage.getItem(revKey(s))||'[]')}catch{return[]}}
function saveRevs(s,a){localStorage.setItem(revKey(s),JSON.stringify(a))}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(location.search);
  let slug=p.get('slug')||p.get('id');

  if(!slug){
    const all=DB.all();
    if(all.length>0){slug=all[0].slug;}
  }

  if(!slug){showErr('لم يتم تحديد منيو.');return;}
  MENU=DB.bySlug(slug);
  if(!MENU){
    const all=DB.all();
    if(all.length>0){MENU=all[0];}
  }
  if(!MENU){showErr('المنيو غير موجود.');return;}

  document.title=MENU.name+' — MenuCraft Pro';
  ACCENT=MENU.color||'#c9a84c';
  document.documentElement.style.setProperty('--accent',ACCENT);
  MENU._revs=loadRevs(MENU.slug||MENU.id);

  drawBg();
  updateBanner();
  renderPop();
  renderCats();
  renderRevs();
  updateRating();
  initRevStars();
  window.addEventListener('resize',drawBg);
});

function scrollToMenu(){document.getElementById('menu-anchor').scrollIntoView({behavior:'smooth'})}

// ── CANVAS BG ──
function drawBg(){
  const cv=document.getElementById('bg-canvas');
  if(!cv)return;
  cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;
  const cx=cv.getContext('2d');
  cx.fillStyle='#1a1a1a';
  cx.fillRect(0,0,cv.width,cv.height);
  
  cx.globalAlpha=.03;
  for(let i=0;i<40;i++){
    cx.strokeStyle=ACCENT;cx.lineWidth=1;
    cx.beginPath();cx.moveTo(Math.random()*cv.width,0);
    cx.lineTo(Math.random()*cv.width,cv.height);cx.stroke();
  }
  
  cx.globalAlpha=.1;
  const init=(MENU?.name||'CT').split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2);
  cx.font=`italic bold ${Math.round(cv.height*.5)}px serif`;
  cx.fillStyle=ACCENT;cx.textAlign='center';
  cx.fillText(init,cv.width*.5,cv.height*.65);
}

// ── BANNER ──
function updateBanner(){
  const name=MENU.name||"Chef's Table";
  const sub=MENU.sub||'Fine Dining';
  const init=name.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const logo=document.getElementById('b-logo');
  logo.textContent=init;
  document.getElementById('b-fine').textContent=sub.toUpperCase();
  document.getElementById('b-name').textContent=name.toUpperCase();
  document.getElementById('s-dishes').textContent=(MENU.items||[]).length;
}

function updateRating(){
  const revs=MENU._revs||[];
  const avg=revs.length?(revs.reduce((s,r)=>s+r.stars,0)/revs.length).toFixed(1):'0.0';
  const stars=document.getElementById('b-stars');
  stars.innerHTML='★★★★★'.split('').map((s,i)=>`<span style="color:${i<Math.round(parseFloat(avg))?ACCENT:'var(--bg4)'};font-size:14px">${s}</span>`).join('');
  document.getElementById('b-rating').textContent=`${avg} (${revs.length})`;
  document.getElementById('s-rating').textContent=avg;
}

// ── POPULAR ──
function renderPop(){
  const items=[...(MENU.items||[])];
  const cats=MENU.cats||MENU.categories||[];
  items.sort((a,b)=>((b.tag==='الأكثر طلباً'?1:0)-(a.tag==='الأكثر طلباً'?1:0)));
  const cur=MENU.currency||'ر.س';
  document.getElementById('pop-row').innerHTML=items.slice(0,8).map(it=>{
    const cat=cats.find(c=>c.id===it.catId);
    return`<div class="pop-card" onclick="addCart('${it.id}')">
      <div class="pop-img">
        <span>${cat?.ico||'🍽️'}</span>
        ${it.tag?`<div class="pop-badge">${it.tag}</div>`:''}
      </div>
      <div class="pop-body">
        <div class="pop-name">${it.name}</div>
        <div class="pop-prices">
          ${it.oldPrice?`<span class="pop-old">${it.oldPrice}</span>`:''}
          <span class="pop-price">${it.price} ${cur}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── CATS ──
function renderCats(){
  const cats=MENU.cats||MENU.categories||[];
  const items=MENU.items||[];
  document.getElementById('cats-count').textContent=cats.length+' صنف';
  document.getElementById('cats-grid').innerHTML=cats.map((cat,i)=>`
    <div class="cat-card" onclick="openCat('${cat.id}')">
      <div class="cat-top">
        <div class="cat-tex"></div>
        <div class="cat-ico">${cat.ico||'🍽️'}</div>
      </div>
      <div class="cat-bot">
        <div class="cat-name">${cat.name}</div>
        <div class="cat-count">${items.filter(it=>it.catId===cat.id).length} أطباق</div>
      </div>
    </div>`).join('');
}

function openCat(catId){
  curCat=catId;
  const cats=MENU.cats||MENU.categories||[];
  const items=(MENU.items||[]).filter(it=>it.catId===catId);
  const cat=cats.find(c=>c.id===catId);
  document.getElementById('iv-title').textContent=cat?.name||'';
  document.getElementById('iv-sub').textContent=items.length+' أطباق';
  document.getElementById('items-list').innerHTML=items.map(it=>itemRow(it,cat)).join('');
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-items').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function openAll(){
  curCat=null;
  const cats=MENU.cats||MENU.categories||[];
  const items=[...(MENU.items||[])].sort((a,b)=>(b.tag==='الأكثر طلباً'?1:0)-(a.tag==='الأكثر طلباً'?1:0));
  document.getElementById('iv-title').textContent='قائمة الطعام';
  document.getElementById('iv-sub').textContent=items.length+' طبق';
  document.getElementById('items-list').innerHTML=items.map(it=>{
    const cat=cats.find(c=>c.id===it.catId);
    return itemRow(it,cat);
  }).join('');
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-items').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function itemRow(it,cat){
  const cur=MENU.currency||'ر.س';
  return`<div class="item-row">
    <div class="item-thumb">${cat?.ico||'🍽️'}</div>
    <div class="item-body">
      ${it.tag?`<div class="item-tag" style="background:${ACCENT}15;color:${ACCENT}">${it.tag}</div>`:'<div style="height:4px"></div>'}
      <div class="item-name">${it.name}</div>
      ${it.desc?`<div class="item-desc">${it.desc}</div>`:''}
      <div class="item-foot">
        <div class="item-prices">
          <span class="item-price" style="color:${ACCENT}">${it.price} ${cur}</span>
        </div>
        <button class="item-add" style="background:var(--tx0)" onclick="addCart('${it.id}')">
          <i class="ti ti-plus"></i>
        </button>
      </div>
    </div>
  </div>`;
}

function showHome(){
  document.getElementById('view-home').style.display='block';
  document.getElementById('view-items').style.display='none';
  curCat=null;
}

// ── REVIEWS ──
function renderRevs(){
  const revs=MENU._revs||[];
  if(!revs.length){
    document.getElementById('rev-row').innerHTML='<div class="empty" style="min-width:260px;text-align:center;padding:20px"><i class="ti ti-message-circle"></i><p>لا توجد تقييمات حتى الآن</p></div>';
    return;
  }
  document.getElementById('rev-row').innerHTML=revs.map(r=>`
    <div class="rev-card">
      <div class="rev-top">
        <div class="rev-av" style="background:${ACCENT}15;color:${ACCENT}">${r.name[0].toUpperCase()}</div>
        <div><div class="rev-nm">${r.name}</div><div class="rev-dt">${r.date}</div></div>
      </div>
      <div class="rev-stars">${'★★★★★'.split('').map((s,i)=>`<span style="color:${i<r.stars?ACCENT:'var(--bg4)'};font-size:14px">${s}</span>`).join('')}</div>
      <div class="rev-txt">${r.text}</div>
    </div>`).join('');
}

function initRevStars(){
  setStars(5);
}

function setStars(n){
  revStars=n;
  document.querySelectorAll('.rf-star').forEach((s,i)=>{
    s.classList.toggle('on',i<n);
    s.style.color=i<n?ACCENT:'var(--bg4)';
  });
}

function submitReview(){
  const name=document.getElementById('rf-name').value.trim();
  const text=document.getElementById('rf-text').value.trim();
  if(!name||!text){showToast('⚠️ يرجى تعبئة كافة الحقول');return;}
  const rev={name,stars:revStars,text,date:new Date().toLocaleDateString('ar-SA'),color:AV_COLORS[(MENU._revs||[]).length%AV_COLORS.length]};
  MENU._revs=[rev,...(MENU._revs||[])];
  saveRevs(MENU.slug||MENU.id,MENU._revs);
  document.getElementById('rf-name').value='';
  document.getElementById('rf-text').value='';
  setStars(5);
  renderRevs();updateRating();
  showToast('✅ شكراً لمشاركتنا رأيك!');
}

// ── CART ──
function addCart(id){
  const it=(MENU.items||[]).find(i=>i.id===id);if(!it)return;
  const ex=CART.find(c=>c.id===id);
  if(ex)ex.qty++;else CART.push({id,name:it.name,price:parseFloat(it.price)||0,qty:1});
  updCartBadge();showToast('🛒 تمت إضافة '+it.name);
}

function updCartBadge(){
  const n=CART.reduce((s,c)=>s+c.qty,0);
  const b=document.getElementById('cart-badge');
  b.textContent=n;b.style.display=n?'flex':'none';
}

function toggleCart(){
  const d=document.getElementById('cart-drawer');
  if(d.classList.contains('open')){closeCart();}else{renderCart();d.classList.add('open');document.getElementById('cart-ov').classList.add('open');}
}
function closeCart(){
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-ov').classList.remove('open');
}

function renderCart(){
  const cur=MENU.currency||'ر.س';
  const total=Math.round(CART.reduce((s,c)=>s+c.price*c.qty,0));
  const body=document.getElementById('cart-body');
  const footer=document.getElementById('cart-footer');
  if(!CART.length){
    body.innerHTML='<div class="empty" style="text-align:center;padding:40px 0"><i class="ti ti-shopping-cart-off"></i><p>سلة طلباتك فارغة</p></div>';
    footer.style.display='none';return;
  }
  body.innerHTML=CART.map((c,i)=>`
    <div class="cd-row">
      <div class="cd-nm">${c.name}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="cd-qbtn" style="background:var(--bg4)" onclick="chQty(${i},-1)">−</button>
          <span style="font-weight:700;font-size:14px">${c.qty}</span>
          <button class="cd-qbtn" style="background:var(--accent)" onclick="chQty(${i},1)">+</button>
        </div>
        <span class="cd-price" style="color:var(--accent);min-width:60px;text-align:left">${Math.round(c.price*c.qty)} ${cur}</span>
      </div>
    </div>`).join('');
  document.getElementById('cart-total').textContent=total+' '+cur;
  document.getElementById('cd-order').style.background=ACCENT;
  footer.style.display='block';
}

function chQty(i,d){CART[i].qty+=d;if(CART[i].qty<=0)CART.splice(i,1);updCartBadge();renderCart();}
function placeOrder(){CART=[];updCartBadge();closeCart();showToast('🎉 تم إرسال طلبك بنجاح!');}

// ── TOAST ──
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function showErr(msg){
  document.getElementById('app').innerHTML=`
    <div class="error-page" style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px">
      <div>
        <i class="ti ti-alert-circle" style="font-size:60px;color:var(--bg4);margin-bottom:20px"></i>
        <h2>${msg}</h2>
        <a href="dashboard.html" style="display:inline-block;margin-top:20px;color:var(--accent);font-weight:700;text-decoration:none">الرجوع للرئيسية</a>
      </div>
    </div>`;
}
</script>
</body></html>
