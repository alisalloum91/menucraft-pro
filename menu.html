<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenuCraft Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   MenuCraft Pro V3 — Lux Aurum RTL
   Stitch AI Design System
═══════════════════════════════════════ */
:root{
  --gold:#c9a84c;--gold2:#e6c364;--gold3:#7a5a1e;
  --bg0:#06060A;--bg1:#0d0d14;--bg2:#14141c;--bg3:#1c1c28;--bg4:#252535;
  --tx0:#fafaf8;--tx1:#c8c5be;--tx2:#8c897f;--tx3:#3a3a4a;
  --glass:rgba(201,168,76,.08);--glass-border:rgba(201,168,76,.18);
  --r:16px;--r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Tajawal',sans-serif;background:var(--bg0);color:var(--tx0);min-height:100vh;direction:rtl;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── BANNER ── */
.banner{position:relative;height:280px;overflow:hidden}
@media(min-width:600px){.banner{height:340px}}
@media(min-width:900px){.banner{height:420px}}
#bg-cv{position:absolute;inset:0;width:100%;height:100%;display:block}
.ov-dark{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.ov-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,10,.99) 0%,rgba(6,6,10,.3) 55%,transparent 100%)}
.ov-gold{position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.06) 0%,transparent 60%)}

.b-top{position:absolute;top:0;left:0;right:0;z-index:4;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
@media(min-width:600px){.b-top{padding:18px 32px}}
.b-icon-btn{width:40px;height:40px;border-radius:12px;background:rgba(0,0,0,.5);border:.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.8);font-size:17px;backdrop-filter:blur(8px);position:relative}
.b-badge{position:absolute;top:-5px;left:-5px;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#1a0e00;font-size:9px;font-weight:800;display:none;align-items:center;justify-content:center;border:2px solid var(--bg0)}
.b-badge.show{display:flex}
.b-open-pill{background:rgba(0,0,0,.55);border:.5px solid rgba(255,255,255,.2);border-radius:24px;padding:7px 16px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px)}
.b-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{box-shadow:0 0 0 5px rgba(74,222,128,0)}}
.b-open-txt{font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px}

.b-bottom{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:16px 18px 20px;display:flex;align-items:flex-end;justify-content:space-between}
@media(min-width:600px){.b-bottom{padding:20px 32px 28px}}
.b-logo{width:60px;height:60px;border-radius:16px;border:2px solid var(--gold);background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px;margin-bottom:10px;backdrop-filter:blur(8px)}
@media(min-width:600px){.b-logo{width:72px;height:72px;font-size:26px}}
.b-sub{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:5px}
@media(min-width:600px){.b-sub{font-size:11px}}
.b-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2.5px;color:#fff;line-height:1;margin-bottom:8px}
@media(min-width:600px){.b-name{font-size:40px}}
@media(min-width:900px){.b-name{font-size:52px}}
.b-stars{display:flex;align-items:center;gap:8px}
.stars-row{display:flex;gap:2px}
.b-rating{font-size:11px;color:rgba(255,255,255,.45)}
.b-order{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;padding:10px 22px;border-radius:24px;border:none;cursor:pointer;white-space:nowrap;box-shadow:0 4px 20px rgba(201,168,76,.35);transition:all .2s}
.b-order:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,168,76,.5)}
@media(min-width:600px){.b-order{font-size:14px;padding:12px 28px}}

/* ── STATS ── */
.stats{background:var(--bg1);border-bottom:.5px solid var(--bg3);display:grid;grid-template-columns:1fr 1fr 1fr}
.stat{display:flex;flex-direction:column;align-items:center;padding:13px 0;border-right:.5px solid var(--bg3)}
.stat:first-child{border:none}
.stat-top{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.stat-top i{font-size:13px;color:var(--gold)}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:.5px}
.stat-l{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase}

/* ── GOLD DIVIDER ── */
.gold-div{height:.5px;background:linear-gradient(to left,transparent,var(--gold),transparent);margin:0;opacity:.3}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;width:100%;padding:0 16px}
@media(min-width:600px){.main{padding:0 28px}}
@media(min-width:960px){.main{padding:0}}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;padding:20px 0 12px}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--tx0)}
@media(min-width:600px){.sh-title{font-size:24px}}
.sh-link{font-size:12px;font-weight:700;color:var(--gold);cursor:pointer;letter-spacing:.3px}
.sh-count{font-size:13px;font-weight:600;color:var(--tx2)}
.sh-add{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--gold);background:var(--glass);border:.5px solid var(--glass-border);border-radius:20px;padding:5px 13px;cursor:pointer;transition:all .15s}
.sh-add:hover{background:rgba(201,168,76,.14)}

/* ── POPULAR ── */
.pop-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.pop-row::-webkit-scrollbar{display:none}
.pop-card{flex-shrink:0;width:152px;background:var(--bg2);border-radius:var(--r);overflow:hidden;border:.5px solid var(--bg3);cursor:pointer;transition:all .2s;scroll-snap-align:start}
.pop-card:hover{transform:translateY(-4px);border-color:var(--glass-border);box-shadow:0 8px 24px rgba(0,0,0,.4)}
@media(min-width:600px){.pop-card{width:180px}}
.pop-img{height:104px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
@media(min-width:600px){.pop-img{height:126px}}
.pop-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.3),transparent)}
.pop-badge{position:absolute;top:8px;right:8px;z-index:1;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;font-size:8px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
.pop-body{padding:10px 11px}
.pop-name{font-size:12px;font-weight:700;color:var(--tx0);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pop-foot{display:flex;align-items:center;justify-content:space-between}
.pop-price{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:.5px}
.pop-old{font-size:10px;color:var(--tx3);text-decoration:line-through;margin-right:4px}
.pop-add{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#1a0e00;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;flex-shrink:0}
.pop-add:active{transform:scale(.82)}
.pop-add i{font-size:13px}

/* ── CATS GRID ── */
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding-bottom:12px}
@media(min-width:600px){.cats-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.cats-grid{grid-template-columns:repeat(4,1fr)}}
.cat-card{border-radius:var(--r);overflow:hidden;cursor:pointer;background:var(--bg2);border:.5px solid var(--bg3);transition:all .2s}
.cat-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--glass-border);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.cat-card:active{transform:scale(.97)}
.cat-top{height:92px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
@media(min-width:600px){.cat-top{height:112px}}
.cat-tex{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025),rgba(255,255,255,.025) 1px,transparent 1px,transparent 14px)}
.cat-ico{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;z-index:1;border:.5px solid rgba(255,255,255,.1);backdrop-filter:blur(4px)}
.cat-bot{padding:9px 12px 11px;border-top:.5px solid rgba(255,255,255,.05)}
.cat-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#fff}
.cat-count{font-size:10px;color:var(--tx2);font-weight:600;margin-top:1px}

/* ── REVIEWS ── */
.rev-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.rev-row::-webkit-scrollbar{display:none}
.rev-card{flex-shrink:0;width:250px;background:var(--glass);border-radius:var(--r);border:.5px solid var(--glass-border);padding:15px;backdrop-filter:blur(8px)}
@media(min-width:600px){.rev-card{width:290px}}
.rv-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rv-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;border:.5px solid var(--glass-border)}
.rv-name{font-size:13px;font-weight:700;color:var(--tx0);margin-bottom:2px}
.rv-date{font-size:10px;color:var(--tx2)}
.rv-stars{display:flex;gap:2px;margin-bottom:8px}
.rv-text{font-size:12px;color:var(--tx1);line-height:1.65}

/* ── REVIEW FORM ── */
.rev-form{background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r);padding:20px;margin-bottom:28px;backdrop-filter:blur(8px)}
.rft{font-size:15px;font-weight:700;color:var(--tx0);margin-bottom:15px}
.rf-in{width:100%;background:var(--bg3);border:.5px solid var(--bg4);border-radius:var(--r-sm);padding:10px 14px;color:var(--tx0);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;margin-bottom:11px;transition:border-color .2s}
.rf-in:focus{border-color:var(--gold)}
.rf-in::placeholder{color:var(--tx3)}
.rf-stars{display:flex;gap:9px;margin-bottom:11px}
.rf-star{font-size:28px;cursor:pointer;color:var(--bg4);transition:color .1s;user-select:none}
.rf-star.on{color:var(--gold)}
.rf-ta{width:100%;background:var(--bg3);border:.5px solid var(--bg4);border-radius:var(--r-sm);padding:10px 14px;color:var(--tx0);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;resize:none;min-height:84px;line-height:1.6;margin-bottom:13px;transition:border-color .2s}
.rf-ta:focus{border-color:var(--gold)}
.rf-ta::placeholder{color:var(--tx3)}
.rf-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;border:none;border-radius:var(--r-sm);padding:11px 24px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(201,168,76,.3)}
.rf-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.45)}

/* ── BACK BAR ── */
.back-bar{display:flex;align-items:center;gap:11px;padding:18px 0 10px}
.back-btn{width:34px;height:34px;border-radius:10px;background:var(--bg2);border:.5px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx1);font-size:15px;transition:background .15s}
.back-btn:hover{background:var(--bg3)}
.bk-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff}
.bk-sub{font-size:11px;color:var(--tx2);font-weight:600;margin-top:1px}

/* ── ITEMS LIST ── */
.items-list{display:flex;flex-direction:column;gap:10px;padding-bottom:28px}
.item-row{background:var(--glass);border:.5px solid var(--glass-border);border-radius:var(--r);display:flex;overflow:hidden;transition:all .2s;backdrop-filter:blur(6px)}
.item-row:hover{border-color:rgba(201,168,76,.35);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.item-thumb{width:88px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
@media(min-width:600px){.item-thumb{width:110px}}
.item-thumb::after{content:'';position:absolute;top:0;right:0;bottom:0;width:.5px;background:var(--glass-border)}
.item-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;justify-content:space-between}
.item-tag{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}
.item-name{font-size:14px;font-weight:700;color:var(--tx0);margin-bottom:4px}
.item-desc{font-size:11px;color:var(--tx2);line-height:1.55;margin-bottom:8px}
.item-foot{display:flex;align-items:center;justify-content:space-between}
.item-prices{display:flex;align-items:baseline;gap:5px}
.item-price{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px}
.item-old{font-size:10px;color:var(--tx3);text-decoration:line-through}
.item-add{width:30px;height:30px;border-radius:50%;border:none;color:#1a0e00;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 2px 8px rgba(201,168,76,.35)}
.item-add:active{transform:scale(.82)}
.item-add i{font-size:15px}

/* ── CART DRAWER ── */
.cart-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:98;backdrop-filter:blur(3px)}
.cart-ov.open{display:block}
.cart-dw{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:540px;z-index:99;background:var(--bg1);border-radius:24px 24px 0 0;border-top:.5px solid var(--glass-border);display:flex;flex-direction:column;max-height:78vh;transition:transform .35s cubic-bezier(.32,0,.67,0)}
.cart-dw.open{transform:translateX(-50%) translateY(0)}
.cd-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.6}
.cd-handle{width:48px;height:4px;background:var(--bg4);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.cd-hdr{padding:13px 20px;border-bottom:.5px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cd-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--tx0)}
.cd-close{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:18px;transition:color .15s;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.cd-close:hover{color:var(--tx0);background:var(--bg3)}
.cd-body{flex:1;overflow-y:auto;padding:0 18px}
.cd-body::-webkit-scrollbar{width:2px}
.cd-body::-webkit-scrollbar-thumb{background:var(--bg4)}
.cd-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:.5px solid var(--bg3)}
.cd-row:last-child{border:none}
.cd-nm{flex:1;font-size:13px;font-weight:700;color:var(--tx0)}
.cd-qty{display:flex;align-items:center;gap:8px}
.cd-qb{width:24px;height:24px;border-radius:50%;border:none;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;transition:filter .15s}
.cd-qb:hover{filter:brightness(1.2)}
.cd-qn{font-size:13px;font-weight:700;min-width:16px;text-align:center;color:var(--tx0)}
.cd-pr{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:64px;text-align:left}
.cd-foot{padding:14px 20px 22px;border-top:.5px solid var(--bg3);flex-shrink:0}
.cd-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cd-total-row>span:first-child{font-size:14px;color:var(--tx2);font-weight:600}
.cd-total{font-family:'Bebas Neue',sans-serif;font-size:26px}
.cd-ord{width:100%;height:50px;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;cursor:pointer;color:#1a0e00;background:linear-gradient(135deg,var(--gold),var(--gold2));box-shadow:0 4px 20px rgba(201,168,76,.4);transition:all .2s}
.cd-ord:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,168,76,.55)}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--bg2);border:.5px solid var(--gold);border-radius:24px;padding:10px 24px;font-size:13px;font-weight:700;color:var(--tx0);opacity:0;transform:translateY(30px);transition:all .35s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px}
.empty i{font-size:44px;color:var(--tx3);display:block;margin-bottom:14px;opacity:.2}
.empty p{font-size:14px;font-weight:600;color:var(--tx3)}
</style>
</head>
<body>
<div id="app">

  <!-- BANNER -->
  <div class="banner">
    <canvas id="bg-cv"></canvas>
    <div class="ov-dark"></div><div class="ov-grad"></div><div class="ov-gold"></div>
    <div class="b-top">
      <div class="b-icon-btn" onclick="toggleCart()" aria-label="السلة">
        <i class="ti ti-shopping-cart" aria-hidden="true"></i>
        <div class="b-badge" id="cart-badge">0</div>
      </div>
      <div class="b-open-pill"><div class="b-dot"></div><span class="b-open-txt">مفتوح الآن</span></div>
      <div class="b-icon-btn"><i class="ti ti-menu-2" aria-hidden="true"></i></div>
    </div>
    <div class="b-bottom">
      <div>
        <div class="b-logo" id="b-logo">CT</div>
        <div class="b-sub" id="b-sub">FINE DINING</div>
        <div class="b-name" id="b-name">CHEF'S TABLE</div>
        <div class="b-stars">
          <div class="stars-row" id="b-stars">★★★★★</div>
          <span class="b-rating" id="b-rating">0.0 (0)</span>
        </div>
      </div>
      <button class="b-order" onclick="scrollToMenu()">اطلب الآن</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-top"><i class="ti ti-star" aria-hidden="true"></i><span class="stat-n" id="s-rating">0.0</span></div>
      <div class="stat-l">تقييم</div>
    </div>
    <div class="stat">
      <div class="stat-top"><i class="ti ti-bowl-chopsticks" aria-hidden="true"></i><span class="stat-n" id="s-dishes">0</span></div>
      <div class="stat-l">طبق</div>
    </div>
    <div class="stat">
      <div class="stat-top"><i class="ti ti-clock" aria-hidden="true"></i><span class="stat-n">30 د</span></div>
      <div class="stat-l">توصيل</div>
    </div>
  </div>
  <div class="gold-div"></div>

  <!-- MAIN -->
  <div class="main" id="menu-anchor">

    <!-- HOME VIEW -->
    <div id="view-home">
      <div class="sh">
        <div class="sh-title">الأكثر طلباً 🔥</div>
        <span class="sh-link" onclick="openAll()">عرض الكل ←</span>
      </div>
      <div class="pop-row" id="pop-row"></div>

      <div class="gold-div" style="margin:4px 0"></div>

      <div class="sh">
        <div class="sh-title">الأصناف</div>
        <span class="sh-count" id="cats-count">0 صنف</span>
      </div>
      <div class="cats-grid" id="cats-grid"></div>

      <div class="gold-div" style="margin:4px 0"></div>

      <div class="sh">
        <div class="sh-title">التقييمات ⭐</div>
        <span class="sh-add" onclick="document.getElementById('rev-form').scrollIntoView({behavior:'smooth'})">
          <i class="ti ti-plus" aria-hidden="true"></i> أضف تقييم
        </span>
      </div>
      <div class="rev-row" id="rev-row"></div>

      <div class="rev-form" id="rev-form">
        <div class="rft">شاركنا تجربتك 📝</div>
        <input class="rf-in" id="rf-name" placeholder="اسمك" maxlength="40">
        <div class="rf-stars" id="rf-stars">
          <span class="rf-star on" onclick="setStar(1)">★</span>
          <span class="rf-star on" onclick="setStar(2)">★</span>
          <span class="rf-star on" onclick="setStar(3)">★</span>
          <span class="rf-star on" onclick="setStar(4)">★</span>
          <span class="rf-star on" onclick="setStar(5)">★</span>
        </div>
        <textarea class="rf-ta" id="rf-text" placeholder="شاركنا تجربتك مع المطعم..."></textarea>
        <button class="rf-btn" onclick="submitRev()">إرسال التقييم</button>
      </div>
    </div>

    <!-- ITEMS VIEW -->
    <div id="view-items" style="display:none">
      <div class="back-bar">
        <button class="back-btn" onclick="showHome()" aria-label="رجوع"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
        <div>
          <div class="bk-title" id="iv-title">الأطباق</div>
          <div class="bk-sub" id="iv-sub">0 أطباق</div>
        </div>
      </div>
      <div class="items-list" id="items-list"></div>
    </div>

  </div>
</div>

<!-- CART -->
<div class="cart-ov" id="cart-ov" onclick="closeCart()"></div>
<div class="cart-dw" id="cart-dw">
  <div class="cd-glow"></div>
  <div class="cd-handle"></div>
  <div class="cd-hdr">
    <div class="cd-title">سلة الطلب</div>
    <button class="cd-close" onclick="closeCart()" aria-label="إغلاق"><i class="ti ti-x" aria-hidden="true"></i></button>
  </div>
  <div class="cd-body" id="cart-body"></div>
  <div class="cd-foot" id="cart-foot" style="display:none">
    <div class="cd-total-row">
      <span>المجموع</span>
      <span class="cd-total" id="cart-total"></span>
    </div>
    <button class="cd-ord" id="cd-ord" onclick="placeOrder()">✓ تأكيد الطلب</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script src="js/storage.js"></script>
<script>
const CATS_BG=['#1a3a28','#1a3020','#2e1c08','#2a2200','#131a2a','#2a1318','#1a1a2e','#1a2a0a'];
const AV_COL=['#c9a84c','#1B7040','#2980b9','#8e44ad','#e74c3c','#16a085','#e67e22','#e91e8c'];
let MENU=null,ACCENT='#c9a84c',CART=[],revStars=5;

function rKey(s){return'mc_rev_'+s}
function loadRevs(s){try{return JSON.parse(localStorage.getItem(rKey(s))||'[]')}catch{return[]}}
function saveRevs(s,a){localStorage.setItem(rKey(s),JSON.stringify(a))}

document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(location.search);
  let slug=p.get('slug')||p.get('id');
  if(!slug){const a=DB.all();if(a.length)slug=a[0].slug||a[0].id;}
  if(!slug){showErr('لم يتم تحديد منيو.');return;}
  MENU=DB.bySlug(slug)||(DB.all()[0]||null);
  if(!MENU){showErr('المنيو غير موجود.');return;}
  document.title=MENU.name+' — MenuCraft Pro';
  ACCENT=MENU.color||'#c9a84c';
  document.documentElement.style.setProperty('--gold',ACCENT);
  MENU._revs=loadRevs(MENU.slug||MENU.id);
  drawBg();updateBanner();renderPop();renderCats();renderRevs();updateRating();
  initStars();window.addEventListener('resize',drawBg);
});

function scrollToMenu(){document.getElementById('menu-anchor').scrollIntoView({behavior:'smooth'})}

// ── CANVAS ──
function drawBg(){
  const cv=document.getElementById('bg-cv');if(!cv)return;
  cv.width=cv.offsetWidth||900;cv.height=cv.offsetHeight||420;
  const cx=cv.getContext('2d');
  const g=cx.createLinearGradient(0,0,cv.width,cv.height);
  g.addColorStop(0,'#1a0e05');g.addColorStop(.5,'#0d0803');g.addColorStop(1,'#050300');
  cx.fillStyle=g;cx.fillRect(0,0,cv.width,cv.height);
  cx.globalAlpha=.06;
  for(let i=0;i<60;i++){
    cx.strokeStyle='rgba(201,168,76,.22)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(i*cv.width/60+Math.random()*20,0);
    cx.lineTo(i*cv.width/60+Math.random()*30,cv.height);cx.stroke();
  }
  cx.globalAlpha=1;
  [[cv.width*.1,cv.height*.3,120],[cv.width*.5,cv.height*.15,160],[cv.width*.9,cv.height*.4,130]].forEach(([x,y,r])=>{
    const rg=cx.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0,ACCENT+'18');rg.addColorStop(1,'transparent');
    cx.fillStyle=rg;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
  });
  const init=(MENU?.name||'CT').split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2);
  cx.globalAlpha=.03;cx.font=`bold ${Math.round(cv.height*.6)}px serif`;
  cx.fillStyle=ACCENT;cx.textAlign='center';
  cx.fillText(init,cv.width*.5,cv.height*.72);cx.globalAlpha=1;
}

// ── BANNER ──
function updateBanner(){
  const name=MENU.name||"Chef's Table";
  const sub=MENU.sub||'Fine Dining';
  const init=name.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const logo=document.getElementById('b-logo');
  logo.textContent=init;logo.style.color=ACCENT;logo.style.borderColor=ACCENT;
  document.getElementById('b-sub').textContent=sub.toUpperCase();
  document.getElementById('b-name').textContent=name.toUpperCase();
  document.getElementById('s-dishes').textContent=(MENU.items||[]).length;
}

function updateRating(){
  const r=MENU._revs||[];
  const avg=r.length?(r.reduce((s,v)=>s+v.stars,0)/r.length).toFixed(1):'0.0';
  const stEl=document.getElementById('b-stars');
  stEl.innerHTML='★★★★★'.split('').map((s,i)=>`<span style="color:${i<Math.round(parseFloat(avg))?ACCENT:'#2a2a3a'};font-size:13px">${s}</span>`).join('');
  document.getElementById('b-rating').textContent=avg+' ('+r.length+')';
  document.getElementById('s-rating').textContent=avg;
}

// ── POPULAR ──
function renderPop(){
  const items=[...(MENU.items||[])];
  const cats=MENU.cats||MENU.categories||[];
  items.sort((a,b)=>(b.tag==='الأكثر طلباً'?1000:0)+(parseFloat(b.orders)||Math.random()*300)-((a.tag==='الأكثر طلباً'?1000:0)+(parseFloat(a.orders)||Math.random()*300)));
  const cur=MENU.currency||'ر.س';
  document.getElementById('pop-row').innerHTML=items.slice(0,8).map(it=>{
    const cat=cats.find(c=>c.id===it.catId);
    const ci=cats.indexOf(cat);
    return`<div class="pop-card">
      <div class="pop-img" style="background:${CATS_BG[ci>=0?ci%CATS_BG.length:0]}">
        <span>${cat?.ico||'🍽️'}</span>
        ${it.tag?`<div class="pop-badge">${it.tag}</div>`:''}
      </div>
      <div class="pop-body">
        <div class="pop-name">${it.name}</div>
        <div class="pop-foot">
          <div>${it.oldPrice?`<span class="pop-old">${it.oldPrice}</span>`:''}
          <span class="pop-price" style="color:${ACCENT}">${it.price} ${cur}</span></div>
          <button class="pop-add" onclick="addCart('${it.id}')" aria-label="إضافة">
            <i class="ti ti-plus" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── CATS ──
function renderCats(){
  const cats=MENU.cats||MENU.categories||[];
  const items=MENU.items||[];
  document.getElementById('cats-count').textContent=cats.length+' صنف';
  document.getElementById('cats-grid').innerHTML=cats.map((cat,i)=>`
    <div class="cat-card" onclick="openCat('${cat.id}')">
      <div class="cat-top" style="background:${CATS_BG[i%CATS_BG.length]}">
        <div class="cat-tex"></div>
        <div class="cat-ico" style="background:${ACCENT}18;border-color:${ACCENT}30">${cat.ico||'🍽️'}</div>
      </div>
      <div class="cat-bot">
        <div class="cat-name">${cat.name}</div>
        <div class="cat-count">${items.filter(it=>it.catId===cat.id).length} أطباق</div>
      </div>
    </div>`).join('');
}

// ── OPEN CAT ──
function openCat(catId){
  const cats=MENU.cats||MENU.categories||[];
  const items=(MENU.items||[]).filter(it=>it.catId===catId);
  const cat=cats.find(c=>c.id===catId);
  const ci=cats.indexOf(cat);
  document.getElementById('iv-title').textContent=cat?.name||'';
  document.getElementById('iv-sub').textContent=items.length+' أطباق';
  document.getElementById('items-list').innerHTML=items.map(it=>itemRow(it,cat,ci)).join('');
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-items').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function openAll(){
  const cats=MENU.cats||MENU.categories||[];
  const items=[...(MENU.items||[])].sort((a,b)=>(b.tag==='الأكثر طلباً'?1:0)-(a.tag==='الأكثر طلباً'?1:0));
  document.getElementById('iv-title').textContent='كل الأطباق';
  document.getElementById('iv-sub').textContent=items.length+' طبق';
  document.getElementById('items-list').innerHTML=items.map(it=>{
    const cat=cats.find(c=>c.id===it.catId);
    return itemRow(it,cat,cats.indexOf(cat));
  }).join('');
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-items').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function itemRow(it,cat,ci){
  const cur=MENU.currency||'ر.س';
  return`<div class="item-row">
    <div class="item-thumb" style="background:${CATS_BG[ci>=0?ci%CATS_BG.length:0]}">${cat?.ico||'🍽️'}</div>
    <div class="item-body">
      ${it.tag?`<div class="item-tag" style="background:${ACCENT}18;color:${ACCENT}">${it.tag}</div>`:'<div style="height:4px"></div>'}
      <div class="item-name">${it.name}</div>
      ${it.desc?`<div class="item-desc">${it.desc}</div>`:''}
      <div class="item-foot">
        <div class="item-prices">
          ${it.oldPrice?`<span class="item-old">${it.oldPrice}</span>`:''}
          <span class="item-price" style="color:${ACCENT}">${it.price} ${cur}</span>
        </div>
        <button class="item-add" onclick="addCart('${it.id}')" aria-label="إضافة">
          <i class="ti ti-plus" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>`;
}

function showHome(){
  document.getElementById('view-home').style.display='block';
  document.getElementById('view-items').style.display='none';
}

// ── REVIEWS ──
function renderRevs(){
  const r=MENU._revs||[];
  if(!r.length){
    document.getElementById('rev-row').innerHTML='<div class="empty" style="min-width:220px"><i class="ti ti-message-circle"></i><p>لا توجد تقييمات — كن الأول!</p></div>';
    return;
  }
  document.getElementById('rev-row').innerHTML=r.map(v=>`
    <div class="rev-card">
      <div class="rv-top">
        <div class="rv-av" style="background:${v.color}20;color:${v.color}">${v.name[0].toUpperCase()}</div>
        <div><div class="rv-name">${v.name}</div><div class="rv-date">${v.date}</div></div>
      </div>
      <div class="rv-stars">${'★★★★★'.split('').map((s,i)=>`<span style="color:${i<v.stars?ACCENT:'#2a2a3a'};font-size:15px">${s}</span>`).join('')}</div>
      <div class="rv-text">${v.text}</div>
    </div>`).join('');
}

function initStars(){document.querySelectorAll('.rf-star').forEach((s,i)=>s.style.color=i<5?ACCENT:'var(--bg4)')}

function setStar(n){
  revStars=n;
  document.querySelectorAll('.rf-star').forEach((s,i)=>{
    s.classList.toggle('on',i<n);s.style.color=i<n?ACCENT:'var(--bg4)';
  });
}

function submitRev(){
  const name=document.getElementById('rf-name').value.trim();
  const text=document.getElementById('rf-text').value.trim();
  if(!name){document.getElementById('rf-name').focus();showToast('⚠️ أدخل اسمك أولاً');return;}
  if(!text){document.getElementById('rf-text').focus();showToast('⚠️ اكتب تقييمك');return;}
  const rev={name,stars:revStars,text,date:new Date().toLocaleDateString('ar-SA'),color:AV_COL[(MENU._revs||[]).length%AV_COL.length]};
  MENU._revs=[rev,...(MENU._revs||[])];
  saveRevs(MENU.slug||MENU.id,MENU._revs);
  document.getElementById('rf-name').value='';
  document.getElementById('rf-text').value='';
  setStar(5);renderRevs();updateRating();
  showToast('✅ شكراً '+name+'! تم إضافة تقييمك');
  document.getElementById('rev-row').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── CART ──
function addCart(id){
  const it=(MENU.items||[]).find(i=>i.id===id);if(!it)return;
  const ex=CART.find(c=>c.id===id);
  if(ex)ex.qty++;else CART.push({id,name:it.name,price:parseFloat(it.price)||0,qty:1});
  updBadge();showToast('🛒 أُضيف: '+it.name);
}
function updBadge(){
  const n=CART.reduce((s,c)=>s+c.qty,0);
  const b=document.getElementById('cart-badge');
  b.textContent=n;b.classList.toggle('show',n>0);
}
function toggleCart(){const d=document.getElementById('cart-dw');if(d.classList.contains('open')){closeCart();}else{renderCart();d.classList.add('open');document.getElementById('cart-ov').classList.add('open');}}
function closeCart(){document.getElementById('cart-dw').classList.remove('open');document.getElementById('cart-ov').classList.remove('open');}
function renderCart(){
  const cur=MENU.currency||'ر.س';
  const total=Math.round(CART.reduce((s,c)=>s+c.price*c.qty,0));
  const body=document.getElementById('cart-body');
  const foot=document.getElementById('cart-foot');
  if(!CART.length){body.innerHTML='<div class="empty"><i class="ti ti-shopping-cart-off"></i><p>السلة فارغة</p></div>';foot.style.display='none';return;}
  body.innerHTML=CART.map((c,i)=>`
    <div class="cd-row">
      <div class="cd-nm">${c.name}</div>
      <div class="cd-qty">
        <button class="cd-qb" style="background:var(--bg4)" onclick="chQty(${i},-1)">−</button>
        <span class="cd-qn">${c.qty}</span>
        <button class="cd-qb" style="background:${ACCENT};color:#1a0e00" onclick="chQty(${i},1)">+</button>
      </div>
      <span class="cd-pr" style="color:${ACCENT}">${Math.round(c.price*c.qty)} ${cur}</span>
    </div>`).join('');
  document.getElementById('cart-total').textContent=total+' '+cur;
  document.getElementById('cart-total').style.color=ACCENT;
  foot.style.display='block';
}
function chQty(i,d){CART[i].qty+=d;if(CART[i].qty<=0)CART.splice(i,1);updBadge();renderCart();}
function placeOrder(){const n=CART.reduce((s,c)=>s+c.qty,0);CART=[];updBadge();closeCart();showToast('🎉 تم إرسال طلبك ('+n+' عنصر) بنجاح!');}

// ── TOAST ──
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── ERROR ──
function showErr(msg){
  document.getElementById('app').innerHTML=`
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg0);text-align:center;padding:40px">
      <div>
        <i class="ti ti-mood-sad" style="font-size:52px;color:var(--tx3);display:block;margin-bottom:16px;opacity:.2"></i>
        <h2 style="font-size:18px;font-weight:700;color:var(--tx0);margin-bottom:8px">${msg}</h2>
        <p style="font-size:13px;color:var(--tx2);margin-bottom:20px">ارجع للداشبورد وافتح المنيو من هناك</p>
        <a href="dashboard.html" style="background:var(--gold);color:#1a0e00;padding:10px 24px;border-radius:24px;font-weight:800;font-size:13px;text-decoration:none">← لوحة التحكم</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
