<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenuCraft Pro — عرض المنيو</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/menu.css">
</head>
<body id="menu-body">

<div id="app">

  <!-- BANNER -->
  <div class="banner" id="banner">
    <canvas id="bg-canvas" class="banner-canvas"></canvas>
    <div class="banner-ov1"></div>
    <div class="banner-ov2"></div>
    <div class="banner-top">
      <div class="banner-cart" onclick="toggleCartDrawer()" aria-label="السلة">
        <i class="ti ti-shopping-cart" aria-hidden="true"></i>
        <div class="banner-cart-badge" id="cart-badge" style="display:none">0</div>
      </div>
      <div class="banner-open">
        <div class="banner-open-dot"></div>
        <span class="banner-open-txt">مفتوح الآن</span>
      </div>
      <div class="banner-menu-btn" aria-label="القائمة">
        <i class="ti ti-menu-2" aria-hidden="true"></i>
      </div>
    </div>
    <div class="banner-bottom">
      <div class="banner-info">
        <div class="banner-logo" id="banner-logo">CT</div>
        <div class="banner-fine" id="banner-fine">FINE DINING</div>
        <div class="banner-name" id="banner-name">CHEF'S TABLE</div>
        <div class="banner-stars-row">
          <div class="banner-stars" id="banner-stars">★★★★★</div>
          <span class="banner-rating" id="banner-rating">4.9 (0)</span>
        </div>
      </div>
      <button class="banner-order-btn" onclick="document.getElementById('popular-sec').scrollIntoView({behavior:'smooth'})">
        اطلب الآن
      </button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-top"><i class="ti ti-star" aria-hidden="true"></i><span class="stat-num" id="stat-rating">0.0</span></div>
      <div class="stat-lbl">تقييم</div>
    </div>
    <div class="stat-item">
      <div class="stat-top"><i class="ti ti-bowl-chopsticks" aria-hidden="true"></i><span class="stat-num" id="stat-dishes">0</span></div>
      <div class="stat-lbl">طبق</div>
    </div>
    <div class="stat-item">
      <div class="stat-top"><i class="ti ti-clock" aria-hidden="true"></i><span class="stat-num">30 د</span></div>
      <div class="stat-lbl">توصيل</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- HOME VIEW -->
    <div id="view-home">

      <!-- POPULAR -->
      <div class="sec-hdr" id="popular-sec">
        <div class="sec-title">الأكثر طلباً 🔥</div>
        <span class="sec-link" onclick="openAllItems()">عرض الكل ←</span>
      </div>
      <div class="pop-scroll" id="popular-row"></div>

      <!-- CATS -->
      <div class="sec-hdr">
        <div class="sec-title">الأصناف</div>
        <span class="sec-count" id="cats-count">0 صنف</span>
      </div>
      <div class="cats-grid" id="cats-grid"></div>

      <!-- REVIEWS -->
      <div class="sec-hdr">
        <div class="sec-title">التقييمات</div>
        <span class="add-rev-btn" onclick="document.getElementById('rev-form-sec').scrollIntoView({behavior:'smooth'})">
          <i class="ti ti-plus" aria-hidden="true"></i> أضف تقييم
        </span>
      </div>
      <div class="reviews-scroll" id="reviews-row"></div>

      <!-- REVIEW FORM -->
      <div class="rev-form-card" id="rev-form-sec">
        <div class="rfc-title">شاركنا تجربتك 📝</div>
        <input class="rfc-input" id="rf-name" placeholder="اسمك" maxlength="40">
        <div class="rfc-stars" id="rfc-stars">
          <span class="rfc-star on" onclick="setRevStar(1)">★</span>
          <span class="rfc-star on" onclick="setRevStar(2)">★</span>
          <span class="rfc-star on" onclick="setRevStar(3)">★</span>
          <span class="rfc-star on" onclick="setRevStar(4)">★</span>
          <span class="rfc-star on" onclick="setRevStar(5)">★</span>
        </div>
        <textarea class="rfc-textarea" id="rf-text" placeholder="شاركنا تجربتك مع المطعم..."></textarea>
        <button class="rfc-submit" onclick="submitReview()">إرسال التقييم</button>
      </div>

    </div>

    <!-- ITEMS VIEW -->
    <div id="view-items" style="display:none">
      <div class="back-bar">
        <button class="back-btn" onclick="showHome()" aria-label="رجوع">
          <i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>
        <div>
          <div class="back-title" id="items-view-title">الأطباق</div>
          <div class="back-sub" id="items-view-sub">0 أطباق</div>
        </div>
      </div>
      <div class="items-list" id="items-list"></div>
    </div>

  </div>
</div>

<!-- CART DRAWER OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCartDrawer()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cd-handle"></div>
  <div class="cd-header">
    <div class="cd-title">سلة الطلب</div>
    <button class="cd-close" onclick="closeCartDrawer()" aria-label="إغلاق">
      <i class="ti ti-x" aria-hidden="true"></i>
    </button>
  </div>
  <div class="cd-body" id="cart-body"></div>
  <div class="cd-footer" id="cart-footer" style="display:none">
    <div class="cd-total-row">
      <span>المجموع</span>
      <span class="cd-total" id="cart-total"></span>
    </div>
    <button class="cd-order" onclick="placeOrder()" id="cd-order-btn">تأكيد الطلب</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toast-wrap">
  <div class="toast-msg" id="toast-msg"></div>
</div>

<script src="js/storage.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
